<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Heritage Sites Explorer - Discover India's magnificent UNESCO and national heritage monuments.">
    <title>Heritage Sites | Incredible India Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .heritage-hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://picsum.photos/id/1015/1920/1080') center/cover;
            height: 65vh;
            display: flex;
            align-items: center;
            position: relative;
        }
        .filter-bar {
            background: var(--bg-dark-modal);
            padding: 20px;
            border-radius: var(--border-radius-lg);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .heritage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        .heritage-card {
            background: var(--bg-dark-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .heritage-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-glow-active);
            border-color: var(--primary-gold);
        }
        .heritage-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .cultural { background: rgba(255,153,51,0.2); color: var(--primary-saffron); }
        .natural { background: rgba(18,136,7,0.2); color: var(--primary-green); }
        .mixed { background: rgba(255,176,31,0.2); color: var(--primary-gold); }
    </style>
</head>
<body>
    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="saffron">Incredible</span>
                <span class="gold">India</span>
                <span class="green">Explorer</span>
            </a>
            <button class="menu-toggle" id="menu-toggle">☰</button>
            <nav class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#map" class="nav-link">Interactive Map</a>
                <a href="cuisine.html" class="nav-link">Cuisine</a>
                <a href="festivals.html" class="nav-link">Festivals</a>
                <a href="culture.html" class="nav-link">Culture</a>
                <div class="nav-dropdown">
                    <button class="nav-link dropdown-toggle">Explore More ▾</button>
                    <div class="dropdown-menu">
                        <a href="travel.html" class="dropdown-item">Travel & Destinations</a>
                        <a href="wildlife.html" class="dropdown-item">Nature & Wildlife</a>
                        <a href="heritage.html" class="dropdown-item">Heritage Sites</a>
                        <a href="personalities.html" class="dropdown-item">Famous Personalities</a>
                        <a href="spiritual.html" class="dropdown-item">Spiritual India</a>
                        <a href="arts-crafts.html" class="dropdown-item">Arts & Crafts</a>
                        <a href="tribes.html" class="dropdown-item">Tribes</a>
                    </div>
                </div>
                <button id="theme-toggle" class="btn-theme-toggle">☀️</button>
            </nav>
        </div>
    </header>

    <main id="app-root">
        <section class="heritage-hero scroll-section">
            <div class="hero-content" style="max-width: 800px; padding: 0 5%; color: white; text-align: center;">
                <h1 class="hero-title">India's Eternal Heritage</h1>
                <p class="hero-description">UNESCO Wonders & Timeless Monuments</p>
            </div>
        </section>

        <div class="container" style="padding: 40px 20px;">
            <div class="filter-bar glass-card">
                <input type="text" id="heritage-search" placeholder="Search heritage sites..." style="flex:1; padding:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px;">
                <select id="state-filter" style="padding:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px;"></select>
                <select id="category-filter" style="padding:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px;">
                    <option value="">All Categories</option>
                    <option value="cultural">Cultural</option>
                    <option value="natural">Natural</option>
                    <option value="mixed">Mixed</option>
                </select>
                <button onclick="resetFilters()" class="btn btn-secondary">Reset</button>
            </div>
            <div id="heritage-grid" class="heritage-grid"></div>
        </div>
    </main>

    <!-- Modal -->
    <div id="heritage-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">
        <div class="modal-content glass-card" style="max-width:800px; width:90%; max-height:90vh; overflow:auto;">
            <span onclick="closeModal()" style="position:absolute; top:15px; right:25px; font-size:2rem; cursor:pointer; color:white;">×</span>
            <div id="modal-image" style="height:300px; background-size:cover; background-position:center;"></div>
            <div style="padding:30px;">
                <h2 id="modal-title" style="margin-bottom:10px;"></h2>
                <p id="modal-state" style="color:var(--primary-gold); font-weight:bold;"></p>
                <div id="modal-description" style="line-height:1.7; margin:20px 0;"></div>
                <button onclick="closeModal()" class="btn btn-primary">Close</button>
            </div>
        </div>
    </div>

    <script>
        const heritageData = [
            {id:1, name:"Taj Mahal", state:"Uttar Pradesh", category:"cultural", image:"https://picsum.photos/id/1015/600/400", description:"Symbol of love and Mughal architecture.", details:"UNESCO World Heritage Site built by Shah Jahan."},
            {id:2, name:"Red Fort", state:"Delhi", category:"cultural", image:"https://picsum.photos/id/133/600/400", description:"Historic fort and seat of Mughal power.", details:"Symbol of India's independence."},
            {id:3, name:"Ajanta Caves", state:"Maharashtra", category:"cultural", image:"https://picsum.photos/id/201/600/400", description:"Ancient Buddhist rock-cut caves with paintings.", details:"UNESCO site from 2nd century BCE."},
            {id:4, name:"Great Himalayan National Park", state:"Himachal Pradesh", category:"natural", image:"https://picsum.photos/id/1016/600/400", description:"Biodiversity hotspot in the Himalayas.", details:"Home to rare wildlife."}
        ];

        function renderHeritage(filtered) {
            const grid = document.getElementById('heritage-grid');
            grid.innerHTML = '';
            filtered.forEach(site => {
                const card = document.createElement('div');
                card.className = 'heritage-card';
                card.innerHTML = `
                    <img src="${site.image}" alt="${site.name}">
                    <div style="padding:20px;">
                        <span class="category-badge ${site.category}">${site.category.toUpperCase()}</span>
                        <h3>${site.name}</h3>
                        <p>${site.state}</p>
                        <p>${site.description}</p>
                    </div>
                `;
                card.onclick = () => showModal(site);
                grid.appendChild(card);
            });
        }

        function filterHeritage() {
            const search = document.getElementById('heritage-search').value.toLowerCase();
            const state = document.getElementById('state-filter').value;
            const cat = document.getElementById('category-filter').value;
            const filtered = heritageData.filter(s => 
                (!search || s.name.toLowerCase().includes(search)) &&
                (!state || s.state === state) &&
                (!cat || s.category === cat)
            );
            renderHeritage(filtered);
        }

        function showModal(site) {
            document.getElementById('modal-image').style.backgroundImage = `url('${site.image}')`;
            document.getElementById('modal-title').textContent = site.name;
            document.getElementById('modal-state').textContent = site.state;
            document.getElementById('modal-description').innerHTML = `<p>${site.details}</p><p>${site.description}</p>`;
            document.getElementById('heritage-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('heritage-modal').style.display = 'none';
        }

        function resetFilters() {
            document.getElementById('heritage-search').value = '';
            document.getElementById('state-filter').value = '';
            document.getElementById('category-filter').value = '';
            renderHeritage(heritageData);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const states = [...new Set(heritageData.map(h => h.state))];
            const select = document.getElementById('state-filter');
            states.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                select.appendChild(opt);
            });
            renderHeritage(heritageData);

            document.getElementById('heritage-search').addEventListener('input', filterHeritage);
            document.getElementById('state-filter').addEventListener('change', filterHeritage);
            document.getElementById('category-filter').addEventListener('change', filterHeritage);
        });
    </script>
    <script src="router.js"></script>
</body>
</html>
