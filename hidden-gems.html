<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hidden Gems of India | Offbeat Destinations</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #e63946;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #333;
    }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                  url('https://source.unsplash.com/random/1600x900/?hidden-himalayas') center/cover;
      height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }
    .container { max-width: 1250px; margin: 0 auto; padding: 0 20px; }
    
    .search-bar input {
      width: 100%;
      max-width: 650px;
      padding: 18px 25px;
      font-size: 1.15rem;
      border: none;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      margin: 25px auto;
      display: block;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .filter-btn {
      padding: 12px 24px;
      background: white;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .filter-btn.active {
      background: var(--primary);
      color: white;
    }

    .gems-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }
    .gem-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      transition: all 0.4s;
    }
    .gem-card:hover {
      transform: scale(1.04);
      box-shadow: 0 20px 40px rgba(0,0,0,0.18);
    }
    .gem-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }
    .gem-info {
      padding: 20px;
    }
    .gem-info h3 {
      font-size: 1.4rem;
      margin-bottom: 6px;
    }
    .region {
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .favorite {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255,255,255,0.95);
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="container">
      <h1 style="font-size: 3.8rem; margin-bottom: 15px;">Hidden Gems of India</h1>
      <p style="font-size: 1.5rem;">Untouched. Unexplored. Unforgettable.</p>
    </div>
  </div>

  <div class="container">
    <input type="text" id="searchInput" placeholder="Search hidden destinations..."/>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-region="all">All Gems</button>
      <button class="filter-btn" data-region="north">North</button>
      <button class="filter-btn" data-region="south">South</button>
      <button class="filter-btn" data-region="east">East & Northeast</button>
      <button class="filter-btn" data-region="west">West</button>
    </div>

    <div class="gems-grid" id="gemsGrid"></div>
  </div>

  <script>
    const gems = [
      {
        id: 1,
        name: "Ziro Valley",
        state: "Arunachal Pradesh",
        region: "east",
        img: "https://source.unsplash.com/random/600x400/?ziro-valley",
        desc: "Mesmerizing rice terraces and Apatani tribal culture"
      },
      {
        id: 2,
        name: "Majuli Island",
        state: "Assam",
        region: "east",
        img: "https://source.unsplash.com/random/600x400/?majuli-island",
        desc: "World's largest river island and Vaishnavite culture"
      },
      {
        id: 3,
        name: "Spiti Valley",
        state: "Himachal Pradesh",
        region: "north",
        img: "https://source.unsplash.com/random/600x400/?spiti-valley",
        desc: "Cold desert with ancient monasteries"
      },
      {
        id: 4,
        name: "Gokarna",
        state: "Karnataka",
        region: "south",
        img: "https://source.unsplash.com/random/600x400/?gokarna-beach",
        desc: "Serene beaches and sacred temples"
      },
      {
        id: 5,
        name: "Kutch Rann",
        state: "Gujarat",
        region: "west",
        img: "https://source.unsplash.com/random/600x400/?white-desert",
        desc: "Magical white salt desert"
      },
      {
        id: 6,
        name: "Lonar Lake",
        state: "Maharashtra",
        region: "west",
        img: "https://source.unsplash.com/random/600x400/?lonar-lake",
        desc: "Mysterious meteor crater lake"
      },
      {
        id: 7,
        name: "Tawang",
        state: "Arunachal Pradesh",
        region: "east",
        img: "https://source.unsplash.com/random/600x400/?tawang-monastery",
        desc: "Ancient monastery and breathtaking Himalayan views"
      },
      {
        id: 8,
        name: "Nelliyampathy",
        state: "Kerala",
        region: "south",
        img: "https://source.unsplash.com/random/600x400/?kerala-hills",
        desc: "Hidden hill station with tea plantations"
      }
    ];

    let favorites = JSON.parse(localStorage.getItem('hiddenGemsFavs')) || [];

    function renderGems(data) {
      const grid = document.getElementById('gemsGrid');
      grid.innerHTML = '';

      data.forEach(gem => {
        const isFav = favorites.includes(gem.id);
        const card = document.createElement('div');
        card.className = 'gem-card';
        card.innerHTML = `
          <img src="${gem.img}" alt="${gem.name}">
          <button class="favorite" onclick="toggleFav(${gem.id}, this)">${isFav ? '❤️' : '♡'}</button>
          <div class="gem-info">
            <h3>${gem.name}</h3>
            <p class="region">${gem.state}</p>
            <p>${gem.desc}</p>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function toggleFav(id, btn) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
        btn.textContent = '♡';
      } else {
        favorites.push(id);
        btn.textContent = '❤️';
      }
      localStorage.setItem('hiddenGemsFavs', JSON.stringify(favorites));
    }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const region = btn.dataset.region;
        const filtered = region === 'all' ? gems : gems.filter(g => g.region === region);
        renderGems(filtered);
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = gems.filter(g => 
        g.name.toLowerCase().includes(term) || 
        g.state.toLowerCase().includes(term) ||
        g.desc.toLowerCase().includes(term)
      );
      renderGems(filtered);
    });

    // Initial Load
    renderGems(gems);
  </script>
    <script src="router.js"></script>
</body>
</html>
