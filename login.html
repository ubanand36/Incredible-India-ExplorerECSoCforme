<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login or Sign up to Incredible India Explorer">
    <title>Login / Sign Up — Incredible India Explorer</title>

    <!-- Google Fonts (same as rest of site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-saffron: hsl(27, 100%, 55%);
            --primary-green: hsl(122, 90%, 28%);
            --primary-gold: hsl(43, 85%, 52%);
            --primary-gold-alt: hsl(40, 75%, 48%);
            --bg-dark-deep: hsl(222, 47%, 8%);
            --bg-dark-card: hsl(222, 35%, 11%);
            --bg-dark-input: hsl(222, 30%, 15%);
            --text-light: hsl(210, 40%, 98%);
            --text-muted: hsl(215, 20%, 65%);
            --border-soft: rgba(255, 176, 31, 0.25);
            --gradient-gold: linear-gradient(135deg, var(--primary-saffron) 0%, var(--primary-gold) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(ellipse at top, hsl(222, 40%, 14%) 0%, var(--bg-dark-deep) 60%);
            color: var(--text-light);
            min-height: 100vh;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-topbar {
            position: absolute;
            top: 24px;
            left: 32px;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .auth-topbar .saffron { color: var(--primary-saffron); }
        .auth-topbar .gold { color: var(--primary-gold); }
        .auth-topbar .green { color: var(--primary-green); }

        .auth-card {
            position: relative;
            width: 100%;
            max-width: 980px;
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            background: var(--bg-dark-card);
            border: 1px solid var(--border-soft);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
        }

        .auth-close {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border-soft);
            background: rgba(0, 0, 0, 0.3);
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1rem;
            z-index: 5;
            transition: 0.25s;
        }

        .auth-close:hover {
            background: var(--primary-gold);
            color: var(--bg-dark-deep);
        }

        /* ---------- Image Panel ---------- */
        .auth-image-panel {
            position: relative;
            background-image: linear-gradient(180deg, rgba(9, 13, 22, 0.35) 0%, rgba(9, 13, 22, 0.85) 100%),
            url('assets/sign.png');
            background-size: cover;
            background-position: center;
            padding: 48px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }


        /* ---------- Form Panel ---------- */
        .auth-form-panel {
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
        }

        .auth-tabs {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 22px;
        }

        .auth-tab-btn {
            background: none;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            padding-bottom: 14px;
            cursor: pointer;
            position: relative;
        }

        .auth-tab-btn.active {
            color: var(--primary-gold);
        }

        .auth-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-gold);
        }

        .auth-welcome {
            font-size: 0.92rem;
            color: var(--text-muted);
            margin-bottom: 22px;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-gold);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin: 22px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            width: 16px;
            height: 16px;
            stroke: var(--text-muted);
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: var(--bg-dark-input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: 0.25s;
        }

        .input-wrap input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(255, 176, 31, 0.15);
        }

        .toggle-eye {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            display: flex;
        }

        .toggle-eye svg {
            position: static;
            width: 17px;
            height: 17px;
            stroke: var(--text-muted);
        }

        .row-between {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .link-gold {
            color: var(--primary-gold);
            font-size: 0.82rem;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Outfit', sans-serif;
        }

        .link-gold:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--gradient-gold);
            color: var(--bg-dark-deep);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-submit:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-switch {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .auth-msg {
            min-height: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .auth-msg.error { color: hsl(0, 80%, 65%); }
        .auth-msg.success { color: hsl(140, 70%, 55%); }

        /* signup-only fields hidden in login mode */
        .auth-card[data-mode="login"] .signup-only {
            display: none;
        }

        .auth-card[data-mode="signup"] .login-only {
            display: none;
        }

        @media (max-width: 820px) {
            .auth-card {
                grid-template-columns: 1fr;
            }

            .auth-image-panel {
                display: none;
            }

            .auth-form-panel {
                padding: 40px 28px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-page">
        <a href="index.html" class="auth-topbar">
            <!-- <span class="saffron">Incredible</span> <span class="gold">India</span> <span class="green">Explorer</span> -->
        </a>

        <div class="auth-card" id="authCard" data-mode="login">
            <a href="index.html" class="auth-close" aria-label="Close">✕</a>

            <!-- Left: Image Panel -->
            <div class="auth-image-panel">
            </div>

            <!-- Right: Form Panel -->
            <div class="auth-form-panel">
                <div class="auth-tabs">
                    <button class="auth-tab-btn active" id="tabLogin" type="button">Login</button>
                    <button class="auth-tab-btn" id="tabSignup" type="button">Sign Up</button>
                </div>

                <p class="auth-welcome" id="welcomeText">Welcome back! Please login to your account.</p>

                <button class="btn-google" id="btnGoogle" type="button">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9C16.98 14.2 17.64 11.9 17.64 9.2z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 0 0 9 18z"/>
                        <path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.98A9 9 0 0 0 0 9c0 1.45.35 2.83.98 4.03l2.97-2.33z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .98 4.97l2.97 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="auth-divider">OR</div>

                <p class="auth-msg" id="authMsg"></p>

                <form id="authForm">
                    <div class="form-group signup-only">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 20c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
                            <input type="text" id="fullName" placeholder="Enter your full name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M3 5h18v14H3z"/><path d="m3 6 9 7 9-7"/></svg>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                            <input type="password" id="password" placeholder="Enter your password" required minlength="6">
                            <button type="button" class="toggle-eye" data-target="password" aria-label="Show password">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group signup-only">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                            <input type="password" id="confirmPassword" placeholder="Re-enter your password" minlength="6">
                            <button type="button" class="toggle-eye" data-target="confirmPassword" aria-label="Show password">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="row-between login-only">
                        <button type="button" class="link-gold" id="forgotPasswordBtn">Forgot Password?</button>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Login</button>
                </form>

                <p class="auth-switch">
                    <span id="switchText">Don't have an account?</span>
                    <button type="button" class="link-gold" id="switchModeBtn">Sign Up</button>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="auth.js"></script>
</body>

</html>
