name: Auto Thank You

on:
  issues:
    types: [opened]

  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  thank-user:
    runs-on: ubuntu-latest

    steps:
      - name: Comment on Issue
        if: github.event_name == 'issues' && github.event.issue.user.login != 'eshajha19'
        uses: actions/github-script@v7
        with:
          script: |
            const message = `
            🙏 Thank you for raising this issue and helping improve the project!

            We truly appreciate the time and effort you took to report this.

            Our team will carefully review the issue and work on it as soon as possible.

            Please make sure the issue includes:
            ✅ Clear description of the problem
            ✅ Steps to reproduce (if applicable)
            ✅ Screenshots or logs for better understanding

            Your support and contributions help make this project better for everyone.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      - name: Comment on PR
        if: github.event_name == 'pull_request_target' && github.event.pull_request.user.login != 'eshajha19'
        uses: actions/github-script@v7
        with:
          script: |
            const message = `
            🎉 Thank you for opening this Pull Request!

            We appreciate your contribution and effort toward improving this project.

            A maintainer will review your PR soon.

            Please ensure:
            ✅ Code follows project guidelines
            ✅ Changes are properly tested
            ✅ No sensitive data or API keys are exposed

            Thank you for contributing to the community.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
